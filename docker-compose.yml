services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "NovaStore123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433' 2>/dev/null && echo healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DB_SERVER: db
      DB_TRUSTED_CONNECTION: "false"
      DB_USER: sa
      DB_PASSWORD: "NovaStore123!"
      DB_NAME: NovaStoreDB
      DB_DRIVER: "ODBC Driver 18 for SQL Server"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mssql_data:
